# Análisis SonarQube de hermes-front (SPA React/Vite/TS).
# Un proyecto Sonar por repositorio; la clave deriva del nombre del repo, igual que en los backends.
# El token NO se versiona: se pasa con -Dsonar.token=... o la variable SONAR_TOKEN.
#   SONAR_TOKEN=xxx npm run sonar
sonar.projectKey=hermes-front
sonar.projectName=hermes-front

sonar.sources=src
sonar.sourceEncoding=UTF-8
sonar.host.url=http://localhost:9001

# El analizador de TS usa el tsconfig para resolver tipos y paths.
sonar.typescript.tsconfigPaths=tsconfig.json

# Generado, tipos y assets: fuera del análisis. (No hay tests ni cobertura: descartada por decisión.)
sonar.exclusions=**/*.d.ts,dist/**,build/**,coverage/**,public/**,**/vite-env.d.ts

# Falsos positivos justificados:
#  - S2068 en los ficheros de traducción i18n: 'password: "Contraseña"' es una ETIQUETA de UI, no una credencial.
sonar.issue.ignore.multicriteria=i18nPwd
sonar.issue.ignore.multicriteria.i18nPwd.ruleKey=typescript:S2068
sonar.issue.ignore.multicriteria.i18nPwd.resourceKey=src/i18n/locales/*.ts
